                <img src="/public/images/korpa.jpg" alt="3D Printana Korpa" class="portfolio-item">

            <div class="portfolio-card">
                <img src="/public/images/nadimak.jpg" alt="Personalizirani Natpis" class="portfolio-item">
            </div>

            <div class="portfolio-card">
                <img src="https://makerworld.bblmw.com/makerworld/model/USb671545cdfd96/design/029e475ebee7cfcf.jpg?x-oss-process=image/resize,w_1000/format,webp" alt="Univerzalna korpa" class="portfolio-item">

            <div class="portfolio-card">
                <img src="https://makerworld.bblmw.com/makerworld/model/US75199736e03c7c/design/13e6a87dda9debd5.png?x-oss-process=image/resize,w_1000/format,webp" alt="Gavel - Sudski čekić" class="portfolio-item">
            </div>

                <img src="https://makerworld.bblmw.com/makerworld/model/DSM00000002508983/design/3e8eb22575d2aa57.jpg?x-oss-process=image/resize,w_1000/format,webp" alt="Organizacijske kutije" class="portfolio-item">
            </div>

            <div class="portfolio-card">
                <img src="https://images.unsplash.com/photo-1581092160562-40aa08e78837?auto=format&fit=crop&q=80&w=1000" alt="Industrijski dio" class="portfolio-item">
            </div>
        </div>

    <section class="card" style="text-align: center; margin-bottom: 80px;">
        <h2>Imate ideju za projekt?</h2>
        <p>Javite nam se i pretvorite svoju zamisao u stvarnost uz pomoć vrhunske 3D tehnologije.</p>
        <br>
        <a href="contact.html" class="btn-primary" style="text-decoration: none; display: inline-block;">Započni projekt</a>
    </section>

    <div id="footer-placeholder"></div>
