<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Registracija - Kic 3D</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Shared styles with login for a unified look */
        .auth-container {
            min-height: calc(100vh - 180px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            margin: 0;
            text-align: center;
        }

        .auth-card h1 {
            margin-bottom: 30px;
            font-size: 2.2rem;
            color: var(--text);
        }

        .auth-card form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 500;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .auth-card input {
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(108, 92, 231, 0.2);
            background: var(--dark);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .auth-card input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(108, 92, 231, 0.2);
        }

        .auth-card p {
            margin-top: 25px;
            color: var(--text-muted);
        }

        .auth-card a {
            color: var(--primary-hover);
            text-decoration: none;
            font-weight: 600;
        }

        .back-home {
            margin-top: 15px;
            display: inline-block;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main class="auth-container">
        <div class="card auth-card">
            <h1><i class="fas fa-user-plus"></i> Registracija</h1>
            
            <form id="register-form">
                <div class="input-group">
                    <label for="reg-email">Email adresa</label>
                    <input type="email" id="reg-email" placeholder="vaš@email.com" required>
                </div>
                
                <div class="input-group">
                    <label for="reg-password">Lozinka</label>
                    <input type="password" id="reg-password" placeholder="Minimalno 6 znakova" required>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Potvrdite lozinku</label>
                    <input type="password" id="confirm-password" placeholder="Ponovite lozinku" required>
                </div>
                
                <button type="submit" class="btn-primary">Izradi račun</button>

                <p>Već imate račun? <a href="/login.html">Prijavite se</a></p>
                <a href="/index.html" class="back-home"><i class="fas fa-arrow-left"></i> Povratak na početnu</a>
            </form>
        </div>
    </main>

    <script type="module">
        import { getNavbar } from './components/nav.js';
        import { register } from './js/auth.js';

        getNavbar();

        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-password').value;
            const confirmPass = document.getElementById('confirm-password').value;

            if (pass !== confirmPass) {
                alert("Lozinke se ne podudaraju!");
                return;
            }

            register(email, pass);
        });
    </script>
</body>
</html>
